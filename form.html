<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Teacher Scheduler</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
    <form id="teacherForm">
<h1> Teacher Scheduler </h1>
<div>
  <h2> Add Teachers</h2>
  <div>
    <input id="tName" placeholder="Teacher Name"/>
    <select id="tSubject">
      <option value="math">Mathematics</option>
      <option value="english">English</option>
      <option value="nepali">Nepali</option>
      <option value="science">Science</option>
      <option value="social">Social Studies</option>
      <option value="other">Other</option>
    </select>
   
    <select id="tType">
      <option value="full">Full Time</option>
      <option value="part">Part Time (3 days/week)</option>
    </select>
    <input id="tPeriod" type="number" value="5" min="1" max="7" style="width:60px" title="Max periods/day"/>
    <button type="button" onclick="addTeacher()"> Add Teacher</button>
  </div>
  <div id="error"></div>
  <div id="teacherList"></div>
</div>
<div class="box">
  <h2>Generate Schedule</h2>
  <button type="button" onclick="generate()">Generate Timetable</button>
  <div id="genMsg"></div>
</div>
<script src="./script.js"></script>
</form>
</body>
</html>
