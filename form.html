<html>
    <head><title>School Schedule</title></head>
    <body>
        <form className="form" method="POST">
            <h3>Teacher Registration Form:</h3>
            <label>Enter your full name :</label>
            <input type="text" placeholder="Your Name" />
            <br />
            <label>Choose your subject:</label>
            <select id="tSubject">
              <option value="math">Math</option>
              <option value="english">English</option>
              <option value="nepali">Nepali</option>
              <option value="science">Science</option>
              <option value="social">Social</option>
              <option value="other">Others</option>
            </select>
            <br />
            <label>Select your role :</label>
           
            PartTime
              <input type="radio" value="PartTime" />
              
    
              FullTime
              <input type="radio" value="FullTime" />
              
            
            
            <br />
            <label>Select your class : </label>
            <select id="tGrade">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
            <input type="button" placeholder="Add Teacher"/>
            <input type="button" placeholder="Generate Schedule"/>
          </form>
    </body>
</html>
